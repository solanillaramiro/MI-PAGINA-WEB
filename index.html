<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA Termodinámica Aplicada | Ingeniería y Servicios Técnicos</title>
    
    <link rel="icon" type="image/png" href="imagenes/logo-nova.png">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        /* Paleta de colores NOVA */
        :root {
            --azul-oscuro: #001b3d;
            --azul-medio: #0a2d56;
            --naranja: #ff6a00;
            --amarillo: #f1b80e;
            --gris-claro: #f4f7f9;
            --blanco: #ffffff;
            --texto-principal: #333333;
            --texto-mutado: #4a5568;
            --borde-tarjeta: #e2e8f0;
            --fondo-tarjeta: #ffffff;
        }

        /* Variables para Modo Oscuro */
        body.dark-mode {
            --azul-oscuro: #0b1329; 
            --azul-medio: #1e293b;
            --gris-claro: #0f172a;
            --texto-principal: #f1f5f9;
            --texto-mutado: #cbd5e1;
            --fondo-tarjeta: #0b1329;
            --borde-tarjeta: #1e293b;
            --blanco: #0b1329;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            color: var(--texto-principal); 
            line-height: 1.6;
            background-color: var(--gris-claro);
            background-image: url('imagenes/Fondo.png');
            background-repeat: no-repeat;
            /* Posición base limpia para pantallas chicas y celulares */
            background-position: right 30% bottom 10%;
            background-size: 650px;
            background-attachment: fixed;
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden; 
        }

        header { 
            background: var(--azul-oscuro); 
            color: #ffffff; 
            padding: 15px 40px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 4px solid #ff6a00;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
            z-index: 100;
            transition: background 0.3s;
        }

        .logo-contenedor {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            height: 90px; 
            width: auto;
            object-fit: contain;
            display: block;
        }

        .logo-texto {
            font-size: 1.8em; 
            font-weight: bold;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            margin: 0;
            color: #ffffff;
        }
        .logo-texto span { color: #ff6a00; }

        nav {
            display: flex;
            align-items: center;
        }

        nav a { 
            color: #ffffff; 
            margin-left: 20px; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 1.05em;
            transition: 0.3s;
            padding: 8px 14px;
            border-radius: 4px;
        }
        nav a:hover { color: var(--azul-oscuro); background-color: #ffffff; }

        .btn-modo-oscuro {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1em;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            box-sizing: border-box;
            margin-left: 20px; 
        }
        
        .btn-modo-oscuro:hover { 
            border-color: #ff6a00; 
            background: rgba(255, 106, 0, 0.1);
            transform: scale(1.05);
        }

        body.dark-mode .btn-modo-oscuro { 
            border-color: rgba(255, 255, 255, 0.2);
            background: transparent;
            color: #ffffff;
        }
        
        body.dark-mode .btn-modo-oscuro:hover {
            border-color: #ff6a00;
            background: rgba(255, 106, 0, 0.1);
        }

        .hero { 
            background: linear-gradient(135deg, #001b3d 0%, #0a2d56 100%);
            color: #ffffff;
            padding: 110px 20px; 
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .hero::after {
            content: '';
            position: absolute;
            top: -25%; 
            right: -10%;
            width: 650px; 
            height: 650px;
            background-image: url('imagenes/Fondo.png');
            background-size: contain;
            background-repeat: no-repeat;
            opacity: 0.35; 
            pointer-events: none;
            transform: rotate(15deg); 
        }

        .hero h2 { font-size: 3em; margin-bottom: 10px; position: relative; z-index: 2; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .hero h3 { color: #f1b80e; font-weight: 400; margin-top: 0; letter-spacing: 1px; position: relative; z-index: 2; font-size: 1.4em; }
        .hero p { max-width: 700px; margin
