<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planes de Mantenimiento | NOVA</title>
    <link rel="icon" href="imagenes/logo-nova.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <style>
        .formulario-contacto { max-width: 600px; margin: 40px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grupo-input { margin-bottom: 20px; }
        .grupo-input label { display: block; margin-bottom: 8px; font-weight: bold; }
        .grupo-input input, .grupo-input select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-enviar { background: #ff6a00; color: white; border: none; padding: 15px 30px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
    <header>
        <div class="logo-contenedor">
            <img src="imagenes/logo-nova.png" alt="Logo NOVA" class="logo-img">
            <h1>NOVA <span>Termodinámica Aplicada</span></h1>
        </div>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="servicios.html" style="color: #ff6a00; font-weight: bold;">Solicitar Mantenimiento</a>
        </nav>
    </header>

    <main style="padding-top: 150px; text-align: center;">
        <h2>Planes de Mantenimiento Inteligente</h2>
        <p style="max-width: 700px; margin: 20px auto;">Suscribite para garantizar prioridad técnica y eficiencia energética todo el año. Completá el formulario para iniciar tu adhesión.</p>

        <section class="formulario-contacto">
            <form action="https://formsubmit.co/nova.termodinamica.aplicada@gmail.com" method="POST">
                <input type="hidden" name="_next" value="https://nova-soluciones.vercel.app/gracias.html">
                <input type="hidden" name="_captcha" value="false">

                <div class="grupo-input">
                    <label>Nombre Completo / Empresa</label>
                    <input type="text" name="nombre" required>
                </div>

                <div class="grupo-input">
                    <label>¿Qué servicio necesitás?</label>
                    <select name="especialidad" required>
                        <option value="aire_acondicionado">❄️ Refrigeración y Climatización</option>
                        <option value="electrico">⚡ Electricidad Industrial y Domiciliaria</option>
                        <option value="electronico">🔬 Electrónica Aplicada</option>
                        <option value="energia">☀️ Energías Renovables</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label>Cantidad de Equipos / Activos</label>
                    <input type="number" name="cantidad" placeholder="Ej: 3" required>
                </div>

                <button type="submit" class="btn-enviar">Solicitar Alta de Mantenimiento</button>
            </form>
        </section>
    </main>
</body>
</html>
