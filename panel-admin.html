<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - NOVA</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #ff6600; color: white; }
        h2 { color: #333; border-bottom: 2px solid #ff6600; display: inline-block; }
        .btn-atendido { background-color: #28a745; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        /* Esta clase hará que toda la fila cambie de color */
        .fila-atendido { background-color: #e0e0e0; color: #777; }
    </style>
</head>
<body>

    <h1>Panel de Administración</h1>

    <h2>Solicitudes de Mantenimiento</h2>
    <table id="tabla-mantenimiento">
        <thead>
            <tr><th>ID</th><th>Nombre</th><th>Teléfono</th><th>Especialidad</th><th>Activos</th><th>Acción</th></tr>
        </thead>
        <tbody id="body-mantenimiento"></tbody>
    </table>

    <h2>Solicitudes de Contacto</h2>
    <table id="tabla-contacto">
        <thead>
            <tr><th>ID</th><th>Nombre</th><th>Teléfono</th><th>Email</th><th>Mensaje</th><th>Acción</th></tr>
        </thead>
        <tbody id="body-contacto"></tbody>
    </table>

    <script>
        function marcarAtendido(id) {
            fetch(`/atender/${id}`, { method: 'POST' }).then(() => location.reload());
        }

        fetch('/datos')
            .then(response => response.json())
            .then(data => {
                const bodyMant = document.getElementById('body-mantenimiento');
                const bodyCont = document.getElementById('body-contacto');
                
                // Ordenar: pendientes primero
                data.sort((a, b) => (a.estado === 'pendiente' ? -1 : 1));

                data.forEach(item => {
                    const esAtendido = item.estado !== 'pendiente';
                    const boton = esAtendido ? 'Atendido' : `<button class="btn-atendido" onclick="marcarAtendido(${item.id})">✅ Atender</button>`;
                    const d = item.datos || {};

                    let fila = document.createElement('tr');
                    if (esAtendido) fila.className = 'fila-atendido';
                    
                    fila.innerHTML = (item.tipo_origen === 'mantenimiento') 
                        ? `<td>${item.id}</td><td>${d.nombre || ''}</td><td>${d.telefono || ''}</td><td>${d.especialidad || ''}</td><td>${d.descripcion || ''}</td><td>${boton}</td>`
                        : `<td>${item.id}</td><td>${d.nombre || ''}</td><td>${d.telefono || ''}</td><td>${d.email || ''}</td><td>${d.mensaje || ''}</td><td>${boton}</td>`;
                    
                    if (item.tipo_origen === 'mantenimiento') bodyMant.appendChild(fila);
                    else bodyCont.appendChild(fila);
                });
            })
            .catch(err => console.error("Error crítico:", err));

        // Refresca la página automáticamente cada 30 segundos
        setInterval(function() {
            location.reload();
        }, 30000); 
    </script>

</body>
</html>
